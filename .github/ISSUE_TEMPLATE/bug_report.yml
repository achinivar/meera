name: Bug Report
description: Report something that isn't working correctly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Also tell us, what did you expect to happen?
      placeholder: "Expected X, but got Y instead..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: |
        List the exact steps so we can reproduce the issue.
      placeholder: |
        1. Open Meera
        2. Type "set volume to 50%"
        3. ...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Meera version
      description: Run `meera version` and paste the output.
      placeholder: "e.g. v0.2"
    validations:
      required: true

  - type: input
    id: distro
    attributes:
      label: Linux distribution
      description: e.g. Ubuntu 24.04, Fedora 41, etc.
    validations:
      required: true

  - type: textarea
    id: debug-output
    attributes:
      label: Debug output
      description: |
        1. Set the debug flags and launch Meera:
        ```bash
        MEERA_DEBUG_TOOL_CALLS=1 MEERA_DEBUG_RETRIEVAL=1 meera
        ```
        2. Reproduce the issue
        3. Copy the terminal output and paste it below
      render: shell
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Meera logs (optional)
      description: |
        Run `meera logs` and paste the last ~100 lines below.
      render: shell
